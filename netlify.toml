[build]
  publish = "."

# SPA-style catch-all for clean URLs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production caching strategy:
# - HTML: always revalidate (5 min cache for stale-while-revalidate benefit)
# - CSS / JS: long cache (query-string ?v=N cache buster invalidates on change)
# - Images: medium cache (1 week — filenames are stable; bump filename to invalidate)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
